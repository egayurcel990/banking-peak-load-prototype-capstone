apiVersion: v1
kind: ConfigMap
metadata:
  name: banking-config
  namespace: banking
data:
  APP_ENV: production
  APP_PORT: "8080"

  CACHE_ENABLED: "true"
  QUEUE_ENABLED: "true"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_RPS: "1000"
  RATE_LIMIT_BURST: "2000"
  CIRCUIT_BREAKER_ENABLED: "true"
  CB_MAX_FAILURES: "5"
  CB_TIMEOUT_SECONDS: "10"
  DB_READ_REPLICA_ENABLED: "true"

  REDIS_ADDR: redis:6379
  CACHE_BALANCE_TTL: "10s"
  CACHE_TX_STATUS_TTL: "30s"
  QUEUE_WORKERS: "10"

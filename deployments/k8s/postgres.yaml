apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: banking
data:
  pg_hba.conf: |
    # TYPE  DATABASE        USER            ADDRESS         METHOD
    local   all             all                             trust
    host    all             all             all             trust
    host    replication     all             all             trust

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: banking
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: banking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args:
            - "-c"
            - "hba_file=/etc/postgresql/pg_hba.conf"
            - "-c"
            - "max_connections=200"
            - "-c"
            - "shared_buffers=512MB"
            - "-c"
            - "effective_cache_size=1GB"
            - "-c"
            - "work_mem=4MB"
            - "-c"
            - "synchronous_commit=off"
            - "-c"
            - "wal_level=replica"
            - "-c"
            - "max_wal_senders=10"
          ports:
            - containerPort: 5432
              name: postgres

          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: POSTGRES_PASSWORD

            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: POSTGRES_DB

            - name: POSTGRES_HOST_AUTH_METHOD
              value: trust

            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF8"

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: postgres-config
              mountPath: /etc/postgresql
              readOnly: true

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - banking
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
                - -d
                - banking
            initialDelaySeconds: 15
            periodSeconds: 10

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: postgres-config
          configMap:
            name: postgres-config

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: banking
spec:
  selector:
    app: postgres

  ports:
    - port: 5432
      targetPort: postgres
      name: postgres

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-replica-pvc
  namespace: banking
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-replica
  namespace: banking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-replica
  template:
    metadata:
      labels:
        app: postgres-replica
    spec:
      containers:
        - name: postgres-replica
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              chown -R postgres:postgres /var/lib/postgresql/data
              mkdir -p "$PGDATA"
              if [ ! -s "$PGDATA/PG_VERSION" ]; then
                su-exec postgres pg_basebackup -h postgres -U postgres -D "$PGDATA" -Fp -Xs -R -P
              fi
              chmod 700 "$PGDATA"
              exec su-exec postgres postgres -D "$PGDATA"
          ports:
            - containerPort: 5432
              name: postgres

          env:
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: POSTGRES_USER

            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: banking-secret
                  key: POSTGRES_PASSWORD

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            - name: postgres-replica-storage
              mountPath: /var/lib/postgresql/data

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10

          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 2Gi

      volumes:
        - name: postgres-replica-storage
          persistentVolumeClaim:
            claimName: postgres-replica-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-replica
  namespace: banking
spec:
  selector:
    app: postgres-replica

  ports:
    - port: 5432
      targetPort: postgres
      name: postgres

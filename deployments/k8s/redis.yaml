apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: banking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
        - name: redis
          image: redis:7-alpine

          args:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --maxmemory
            - 256mb
            - --maxmemory-policy
            - allkeys-lru

          ports:
            - containerPort: 6379
              name: redis

          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10

          resources:
            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 500m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: banking

spec:
  selector:
    app: redis

  ports:
    - port: 6379
      targetPort: redis
      name: redis
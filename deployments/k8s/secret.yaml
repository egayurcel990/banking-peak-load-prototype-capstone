apiVersion: v1
kind: Secret
metadata:
  name: banking-secret
  namespace: banking
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: banking

  DB_PRIMARY_DSN: postgres://postgres:postgres@postgres:5432/banking?sslmode=disable
  PGBOUNCER_DSN: postgres://postgres:postgres@pgbouncer:6432/banking?sslmode=disable
  PGBOUNCER_READ_DSN: postgres://postgres:postgres@pgbouncer:6432/banking_read?sslmode=disable
  QUEUE_URL: amqp://guest:guest@rabbitmq:5672/
